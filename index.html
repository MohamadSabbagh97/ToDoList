<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Day 2 Simple To‑Do List App</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <main class="container py-4">
    <header class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-4">
      <div>
        <h1 class="h3 mb-0">To‑Do List</h1>
        <p class="text-muted mb-0">Simple, responsive task manager — localStorage persistence</p>
      </div>

      <div class="mt-3 mt-md-0">
        <button id="clearAllBtn" class="btn btn-outline-danger btn-sm">Clear All</button>
      </div>
    </header>

    <!-- Add task card -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <form id="taskForm" class="row g-2 align-items-center">
          <div class="col-12 col-md">
            <label for="taskInput" class="visually-hidden">New task</label>
            <input id="taskInput" class="form-control form-control-lg" type="text" placeholder="Add a new task..." maxlength="200" required />
          </div>

          <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-lg">Add</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Task lists -->
    <section class="row g-3">
      <div class="col-12 col-lg-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <h2 class="h5 mb-3">Pending <span id="pendingCount" class="badge bg-secondary">0</span></h2>
            <ul id="pendingList" class="list-group list-group-flush mb-3 overflow-auto"></ul>
            <div class="mt-auto text-muted small">Tasks you still need to do</div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <h2 class="h5 mb-3">Completed <span id="completedCount" class="badge bg-success">0</span></h2>
            <ul id="completedList" class="list-group list-group-flush mb-3 overflow-auto"></ul>
            <div class="mt-auto text-muted small">Finished tasks</div>
          </div>
        </div>
      </div>
    </section>

    <footer class="mt-4 text-center text-muted small">
      Built with HTML, CSS, JavaScript, and Bootstrap 5 .
    </footer>
  </main>

  <!-- Edit Task Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="editForm">
          <div class="modal-header">
            <h5 class="modal-title">Edit Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <label for="editInput" class="form-label">Task</label>
            <input id="editInput" class="form-control" type="text" maxlength="200" required />
            <input type="hidden" id="editId" />
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App script -->
  <script src="script.js"></script>
</body>
</html>
